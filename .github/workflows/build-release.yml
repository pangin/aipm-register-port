name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: restore
        run: dotnet restore
      - name: build
        run: dotnet build --no-restore --configuration Release
      - name: test
        run: dotnet test --no-build --configuration Release --logger "console;verbosity=normal"

  publish:
    name: publish (${{ matrix.rid }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Most rows use native runners so PublishAot links against the
          # right toolchain. macOS Intel (osx-x64) is cross-built from the
          # Apple Silicon runner because macos-13 has been retired from the
          # free GitHub-hosted pool — the cross-compile is fine for self-
          # contained / single-file but Native AOT is skipped for that RID.
          - { os: windows-latest,   rid: win-x64,     ext: .exe, suffix: windows-x64,    is_mac: false, skip_aot: false }
          - { os: windows-11-arm,   rid: win-arm64,   ext: .exe, suffix: windows-arm64,  is_mac: false, skip_aot: false }
          - { os: ubuntu-latest,    rid: linux-x64,   ext: '',   suffix: linux-x64,      is_mac: false, skip_aot: false }
          - { os: ubuntu-24.04-arm, rid: linux-arm64, ext: '',   suffix: linux-arm64,    is_mac: false, skip_aot: false }
          - { os: macos-latest,     rid: osx-arm64,   ext: '',   suffix: macos-arm64,    is_mac: true,  skip_aot: false }
          - { os: macos-latest,     rid: osx-x64,     ext: '',   suffix: macos-x64,      is_mac: true,  skip_aot: true  }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Strip the leading "v" from the tag so we can feed a clean SemVer
      # to dotnet publish (-p:Version=...), use it in artifact filenames,
      # and write it into the macOS Info.plist's CFBundleShortVersionString.
      - name: derive version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version $VERSION from tag $GITHUB_REF_NAME"

      - name: configure macOS signing certificate
        if: matrix.is_mac == true
        shell: bash
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
        run: |
          if [ -z "$MACOS_CERTIFICATE_P12_BASE64" ] &&
             [ -z "$MACOS_CERTIFICATE_PASSWORD" ] &&
             [ -z "$MACOS_CODESIGN_IDENTITY" ]; then
            echo "MACOS_SIGNING_CONFIGURED=false" >> "$GITHUB_ENV"
            exit 0
          fi

          if [ -z "$MACOS_CERTIFICATE_P12_BASE64" ] ||
             [ -z "$MACOS_CERTIFICATE_PASSWORD" ] ||
             [ -z "$MACOS_CODESIGN_IDENTITY" ]; then
            echo "::error::Set MACOS_CERTIFICATE_P12_BASE64, MACOS_CERTIFICATE_PASSWORD, and MACOS_CODESIGN_IDENTITY together."
            exit 1
          fi

          CERTIFICATE_PATH="$RUNNER_TEMP/macos-signing-certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/aipm-register-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          echo "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          echo "MACOS_SIGNING_CONFIGURED=true" >> "$GITHUB_ENV"
          echo "MACOS_CODESIGN_IDENTITY=$MACOS_CODESIGN_IDENTITY" >> "$GITHUB_ENV"
          echo "MACOS_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      # ---------- CLI (self-contained single-file) ----------
      - name: publish CLI
        shell: bash
        run: |
          dotnet publish src/AipmRegister.Cli \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:Version=${{ steps.version.outputs.version }} \
            -o out/cli
          mv "out/cli/AipmRegister.Cli${{ matrix.ext }}" \
             "out/cli/aipm-register-cli-${{ steps.version.outputs.version }}-${{ matrix.suffix }}${{ matrix.ext }}"
          ls -la out/cli

      # ---------- CLI (Native AOT) ----------
      - name: publish CLI (Native AOT)
        if: matrix.skip_aot != true
        shell: bash
        run: |
          dotnet publish src/AipmRegister.Cli \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            -p:PublishAot=true \
            -p:InvariantGlobalization=true \
            -p:IlcOptimizationPreference=Size \
            -p:Version=${{ steps.version.outputs.version }} \
            -o out/cli-aot
          mv "out/cli-aot/AipmRegister.Cli${{ matrix.ext }}" \
             "out/cli-aot/aipm-register-cli-aot-${{ steps.version.outputs.version }}-${{ matrix.suffix }}${{ matrix.ext }}"
          ls -la out/cli-aot

      # ---------- GUI ----------
      - name: publish GUI
        shell: bash
        run: |
          dotnet publish src/AipmRegister.Gui \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:Version=${{ steps.version.outputs.version }} \
            -o out/gui
          ls -la out/gui

      - name: rename GUI (non-macOS)
        if: matrix.is_mac == false
        shell: bash
        run: |
          mv "out/gui/AipmRegister.Gui${{ matrix.ext }}" \
             "out/gui/aipm-register-gui-${{ steps.version.outputs.version }}-${{ matrix.suffix }}${{ matrix.ext }}"

      # ---------- GUI (Native AOT, non-macOS only) ----------
      # macOS GUI AOT is feasible but requires a parallel .app-bundle +
      # codesign + notarize pass that doubles the macOS job runtime;
      # ship AOT GUI for Windows + Linux for now and revisit macOS once
      # the .app-bundle script is parameterised.
      - name: publish GUI (Native AOT)
        if: matrix.is_mac == false && matrix.skip_aot != true
        shell: bash
        run: |
          dotnet publish src/AipmRegister.Gui \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            -p:PublishAot=true \
            -p:InvariantGlobalization=true \
            -p:IlcOptimizationPreference=Size \
            -p:Version=${{ steps.version.outputs.version }} \
            -o out/gui-aot
          mv "out/gui-aot/AipmRegister.Gui${{ matrix.ext }}" \
             "out/gui-aot/aipm-register-gui-aot-${{ steps.version.outputs.version }}-${{ matrix.suffix }}${{ matrix.ext }}"
          ls -la out/gui-aot

      - name: bundle GUI as .app (macOS)
        if: matrix.is_mac == true
        shell: bash
        env:
          MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          MACOS_NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
          MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          BUNDLE="out/gui/AipmRegister.app"
          mkdir -p "$BUNDLE/Contents/MacOS"
          mkdir -p "$BUNDLE/Contents/Resources"

          # The single-file binary is the launchable; native libraries are
          # packed for self-extraction by the publish step.
          cp -R out/gui/AipmRegister.Gui "$BUNDLE/Contents/MacOS/AipmRegister"
          chmod +x "$BUNDLE/Contents/MacOS/AipmRegister"

          # Minimal Info.plist. Version strings come from the git tag so
          # macOS Finder / About panes match the release artifact name.
          cat > "$BUNDLE/Contents/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>      <string>en</string>
            <key>CFBundleExecutable</key>             <string>AipmRegister</string>
            <key>CFBundleIdentifier</key>             <string>com.pangin.aipmregister</string>
            <key>CFBundleInfoDictionaryVersion</key>  <string>6.0</string>
            <key>CFBundleName</key>                   <string>aipm-register</string>
            <key>CFBundlePackageType</key>            <string>APPL</string>
            <key>CFBundleShortVersionString</key>     <string>${VERSION}</string>
            <key>CFBundleVersion</key>                <string>${VERSION}</string>
            <key>NSHighResolutionCapable</key>        <true/>
            <key>LSMinimumSystemVersion</key>         <string>11.0</string>
            <key>NSLocationUsageDescription</key>     <string>SSID 스캔 결과를 보여주려면 위치 권한이 필요합니다 (실제 위치는 사용하지 않습니다).</string>
            <key>NSLocationWhenInUseUsageDescription</key> <string>Shows nearby Wi-Fi networks. Your location is not transmitted.</string>
          </dict>
          </plist>
          PLIST

          # Sign the final app bundle, not just the published Mach-O. Without
          # this, Gatekeeper sees an incomplete resource envelope after the
          # executable is moved into Contents/MacOS.
          if [ "${MACOS_SIGNING_CONFIGURED:-false}" = "true" ]; then
            codesign --force \
              --deep \
              --timestamp \
              --options runtime \
              --entitlements build/macos/AipmRegister.entitlements \
              --keychain "$MACOS_KEYCHAIN_PATH" \
              --sign "$MACOS_CODESIGN_IDENTITY" \
              "$BUNDLE"
          else
            codesign --force --deep --sign - "$BUNDLE"
          fi

          codesign --verify --deep --strict --verbose=4 "$BUNDLE"

          NOTARY_SECRET_COUNT=0
          [ -n "$MACOS_NOTARY_APPLE_ID" ] && NOTARY_SECRET_COUNT=$((NOTARY_SECRET_COUNT + 1))
          [ -n "$MACOS_NOTARY_PASSWORD" ] && NOTARY_SECRET_COUNT=$((NOTARY_SECRET_COUNT + 1))
          [ -n "$MACOS_NOTARY_TEAM_ID" ] && NOTARY_SECRET_COUNT=$((NOTARY_SECRET_COUNT + 1))

          if [ "$NOTARY_SECRET_COUNT" -gt 0 ] && [ "$NOTARY_SECRET_COUNT" -lt 3 ]; then
            echo "::error::Set MACOS_NOTARY_APPLE_ID, MACOS_NOTARY_PASSWORD, and MACOS_NOTARY_TEAM_ID together."
            exit 1
          fi

          if [ "$NOTARY_SECRET_COUNT" -eq 3 ] &&
             [ "${MACOS_SIGNING_CONFIGURED:-false}" != "true" ]; then
            echo "::error::Notarization requires a Developer ID signing certificate."
            exit 1
          fi

          if [ "${MACOS_SIGNING_CONFIGURED:-false}" = "true" ] &&
             [ "$NOTARY_SECRET_COUNT" -eq 3 ]; then
            NOTARY_ZIP="out/gui/aipm-register-gui-${{ steps.version.outputs.version }}-${{ matrix.suffix }}-notary.zip"
            ditto -c -k --sequesterRsrc --keepParent "$BUNDLE" "$NOTARY_ZIP"
            xcrun notarytool submit "$NOTARY_ZIP" \
              --apple-id "$MACOS_NOTARY_APPLE_ID" \
              --password "$MACOS_NOTARY_PASSWORD" \
              --team-id "$MACOS_NOTARY_TEAM_ID" \
              --wait
            xcrun stapler staple "$BUNDLE"
            xcrun stapler validate "$BUNDLE"
          fi

          # Zip the .app so it survives the GitHub Releases upload (which
          # treats directories as files only via tarballs/zips).
          ditto -c -k --sequesterRsrc --keepParent \
            "$BUNDLE" \
            "out/gui/aipm-register-gui-${{ steps.version.outputs.version }}-${{ matrix.suffix }}.app.zip"
          ls -la out/gui

      # ---------- Upload ----------
      # softprops/action-gh-release@v2 silently skips files that don't exist,
      # so the AOT artifact path can stay listed even on the AOT-skipped row.
      - name: upload (CLI + AOT + non-macOS GUI)
        if: matrix.is_mac == false
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/cli/aipm-register-cli-${{ steps.version.outputs.version }}-${{ matrix.suffix }}${{ matrix.ext }}
            out/cli-aot/aipm-register-cli-aot-${{ steps.version.outputs.version }}-${{ matrix.suffix }}${{ matrix.ext }}
            out/gui/aipm-register-gui-${{ steps.version.outputs.version }}-${{ matrix.suffix }}${{ matrix.ext }}
            out/gui-aot/aipm-register-gui-aot-${{ steps.version.outputs.version }}-${{ matrix.suffix }}${{ matrix.ext }}

      - name: upload (CLI + AOT + macOS .app.zip)
        if: matrix.is_mac == true
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/cli/aipm-register-cli-${{ steps.version.outputs.version }}-${{ matrix.suffix }}
            out/cli-aot/aipm-register-cli-aot-${{ steps.version.outputs.version }}-${{ matrix.suffix }}
            out/gui/aipm-register-gui-${{ steps.version.outputs.version }}-${{ matrix.suffix }}.app.zip
